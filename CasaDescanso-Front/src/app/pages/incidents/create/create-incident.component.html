<div class="form-container" style="max-width: 650px; margin: 0 auto;">
  @if (!isError()) {
  <div class="form-card">
    <h3><span class="icon">📄</span> GENERAR INCIDENCIA NUEVA</h3>
    <p class="subtitle">Seleccione el residente con el cual se suscitó la incidencia.</p>

    <div class="form-group full-width">
      <label>RESIDENTE *</label>
      <select class="custom-select"  (change)="onSeleccionar($event)">
        <option [value]="0" disabled selected>-- BUSCAR RESIDENTE POR NOMBRE --</option>
        @for (u of residentes(); track u.id) {
        <option [value]="u.id">
          {{ (u.firstName + ' ' + u.lastName + ' ' + (u.middleName || '')) }}
        </option>
        }
      </select>
    </div>

    @if (residenteSeleccionado()) {
    <div class="incident-details">
      <div class="grid-layout">
        <div class="form-group">
          <label>TIPO DE INCIDENCIA *</label>
          <select class="custom-select" [ngModel]="tipoIncidente()" (ngModelChange)="tipoIncidente.set($event)">
            <option value="" disabled selected>-- SELECCIONAR TIPO --</option>
            <option value="Caída">CAÍDA</option>
            <option value="Médico">EMERGENCIA MÉDICA</option>
            <option value="Conducta">CONDUCTA / COMPORTAMIENTO</option>
            <option value="Otro">OTRO</option>
          </select>
        </div>

        <div class="form-group">
          <label>NIVEL DE SEVERIDAD *</label>
          <select class="custom-select" [ngModel]="severidad()" (ngModelChange)="severidad.set($event)">
            <option value="" disabled selected>-- SELECCIONAR NIVEL --</option>
            <option value="Bajo">BAJO</option>
            <option value="Medio">MEDIO</option>
            <option value="Crítico">CRÍTICO</option>
          </select>
        </div>
      </div>

      <div class="form-group full-width" style="margin-top: 15px;">
        <label>DESCRIPCIÓN DETALLADA DEL SUCESO *</label>
        <textarea class="custom-textarea" [ngModel]="descripcion()" (ngModelChange)="descripcion.set($event)" rows="4"
          placeholder="DESCRIBA LOS HECHOS, LUGAR Y CIRCUNSTANCIAS...">
          </textarea>
      </div>

      <div class="actions">
        <button class="btn-cancel" (click)="resetVista()">CANCELAR</button>
        <button class="btn-submit" [disabled]="loading()" (click)="onSubmit()">
          {{ loading() ? 'PROCESANDO...' : 'GUARDAR INCIDENCIA' }}
        </button>
        <button class="btn-submit" (click)="resetVista()">NUEVA INCIDENCIA</button>

        <button class="btn-back" (click)="resetVista()">INTENTAR DE NUEVO</button>
      </div>
    </div>
    }
  </div>
  }

  @else {
  <div class="success-card" style="border-top: 6px solid #F9A825;">
    <div class="success-content">
      <div class="success-icon" style="color: #F9A825;">⚠️</div>
      <h2>AVISO DEL SISTEMA</h2>
      <div class="info-box">
        <p>{{ errorMessage() | uppercase }}</p>
      </div>
      <button class="btn-back" (click)="resetVista()">INTENTAR DE NUEVO</button>
    </div>
  </div>
  }

  @if (isSuccess()) {
  <div class="success-card" style="border-top: 6px solid #005BB5; margin-top: 20px;">
    <div class="success-content">
      <div class="success-icon" style="color: #005BB5;">✅</div>
      <h2>¡ÉXITO!</h2>
      <p>LA INCIDENCIA HA SIDO REGISTRADA CORRECTAMENTE.</p>
      <button class="btn-submit" (click)="isSuccess.set(false); resetVista();">NUEVA INCIDENCIA</button>
    </div>
  </div>
  }
</div>
